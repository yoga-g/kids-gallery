<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yoga's Art Gallery</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <div class="header-controls">
      <button id="lang-toggle" class="ctrl-btn" title="切换中文">中</button>
      <button id="theme-toggle" class="ctrl-btn" title="Toggle dark mode">🌙</button>
    </div>
    <h1>🧑‍🎨 <span data-i18n="title">Yoga's Art Gallery</span></h1>
    <p class="subtitle"><span data-i18n="subtitle">Every piece tells a story</span></p>
  </header>

  <nav id="month-nav" class="month-nav"></nav>
  <div id="tag-filter" class="tag-filter"></div>

  <main id="gallery" class="gallery"></main>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox" hidden>
    <button class="lightbox-close" aria-label="Close">&times;</button>
    <button class="lightbox-prev" aria-label="Previous">&#10094;</button>
    <button class="lightbox-next" aria-label="Next">&#10095;</button>
    <div class="lightbox-content">
      <img id="lightbox-img" src="" alt="">
      <div id="lightbox-caption" class="lightbox-caption"></div>
      <div id="lightbox-counter" class="lightbox-counter"></div>
    </div>
  </div>

  <footer class="site-footer">
    <p class="copyright">&copy; 2025&ndash;2026 Yoga. <span data-i18n="rights">All rights reserved.</span></p>
    <p class="copyright-notice"><span data-i18n="copyright_notice">All artworks on this site are original creations and protected by copyright law. Unauthorized reproduction, distribution, or use is strictly prohibited.</span></p>
    <p><span data-i18n="made_with">Made with</span> ❤️</p>
  </footer>

  <script src="js/gallery.js"></script>
</body>
</html>
